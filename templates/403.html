<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibii Bot · Kein Zugriff</title>
    <style>
        :root {
            --bg-app: #0b0b12;
            --card-bg: rgba(25, 25, 35, 0.7);
            --border-accent: rgba(138, 79, 255, 0.3);
            --text-primary: #f0f0f0;
            --text-secondary: #a8a8c0;
            --accent: #8a4fff;
            --red: #ff5f5f;
            --radius-lg: 24px;
            --shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.8);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            background: radial-gradient(circle at top right, #1e0a3d, #06040a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .error-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }
        .logo-fibii {
            background: linear-gradient(135deg, #fff, #c5c5e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-bot {
            background: linear-gradient(135deg, var(--accent), #b48aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-left: 0.2rem;
        }
        h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--red);
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: var(--transition);
        }
        .btn:hover {
            opacity: 0.85;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(138, 79, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="logo">
            <span class="logo-fibii">fibii</span><span class="logo-bot">BOT</span>
        </div>
        <h2>403</h2>
        <p>Du hast keine Berechtigung für diese Seite.</p>
        <a href="/" class="btn">← Zurück zum Dashboard</a>
    </div>
</body>
</html>
